<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Gerador de QR Code</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

</head>
<body>

<div class="container">

<h1>📱 Gerador de QR Code</h1>

<textarea id="texto" placeholder="Digite um texto ou URL..."></textarea>

<div class="opcoes">

    <div>
        <label>Tamanho</label>
        <select id="tamanho" disabled>
            <option value="256" selected>256 px</option>
        </select>
    </div>

    <div>
        <label>Cor</label>
        <input type="color" id="cor" value="#000000" disabled>
    </div>

    <div>
        <label>Fundo</label>
        <select id="fundo" disabled>
            <option value="#ffffff" selected>Branco</option>
        </select>
    </div>

</div>

<button onclick="gerarQRCode()">
Gerar QR Code
</button>

<div id="qrcode"></div>

<button id="download" onclick="baixarQRCode()">
Baixar PNG
</button>

</div>

<script src="script.js"></script>

</body>
</html>
