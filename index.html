<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerador de QR Code</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/qr-code-styling@1.6.0-rc.1/lib/qr-code-styling.js"></script>
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface-hover: #334155;
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --primary: #38bdf8;
      --primary-hover: #0ea5e9;
      --ring: rgba(56, 189, 248, 0.35);
      --shadow: 0 20px 60px -15px rgba(0, 0, 0, 0.45);
      --radius: 24px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 40px 32px;
      text-align: center;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }

    p {
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-bottom: 28px;
    }

    .input-wrapper {
      position: relative;
      margin-bottom: 24px;
    }

    input[type="text"] {
      width: 100%;
      padding: 16px 18px;
      font-size: 1rem;
      font-family: inherit;
      color: var(--text);
      background: var(--bg);
      border: 2px solid transparent;
      border-radius: 16px;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input[type="text"]::placeholder {
      color: var(--text-muted);
    }

    input[type="text"]:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px var(--ring);
    }

    .qr-wrapper {
      display: flex;
      justify-content: center;
      margin-bottom: 24px;
      min-height: 220px;
      align-items: center;
    }

    #qrcode {
      background: #ffffff;
      border-radius: 20px;
      padding: 16px;
      box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.3);
    }

    .empty-state {
      color: var(--text-muted);
      font-size: 0.9rem;
      padding: 40px 20px;
    }

    button {
      width: 100%;
      padding: 16px 20px;
      font-size: 1rem;
      font-weight: 600;
      font-family: inherit;
      color: var(--bg);
      background: var(--primary);
      border: none;
      border-radius: 16px;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.1s ease;
    }

    button:hover {
      background: var(--primary-hover);
    }

    button:active {
      transform: scale(0.98);
    }

    button:disabled {
      background: var(--surface-hover);
      color: var(--text-muted);
      cursor: not-allowed;
      transform: none;
    }

    .footer {
      margin-top: 24px;
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    @media (max-width: 480px) {
      .container {
        padding: 32px 24px;
      }

      h1 {
        font-size: 1.35rem;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>Gerador de QR Code</h1>
    <p>Digite um texto ou link para gerar o QR Code.</p>

    <div class="input-wrapper">
      <input
        type="text"
        id="textInput"
        placeholder="Cole ou digite aqui..."
        autocomplete="off"
      />
    </div>

    <div class="qr-wrapper">
      <div id="qrcode">
        <div class="empty-state">Seu QR Code aparecerá aqui</div>
      </div>
    </div>

    <button id="downloadBtn" disabled>Baixar QR Code (PNG)</button>

    <div class="footer">Design simples e moderno</div>
  </main>

  <script>
    const input = document.getElementById('textInput');
    const qrContainer = document.getElementById('qrcode');
    const downloadBtn = document.getElementById('downloadBtn');

    let qrCode = null;

    const primaryColor = '#0f172a';
    const backgroundColor = '#ffffff';

    function createQR(value) {
      qrContainer.innerHTML = '';

      if (!value.trim()) {
        qrContainer.innerHTML = '<div class="empty-state">Seu QR Code aparecerá aqui</div>';
        downloadBtn.disabled = true;
        return;
      }

      qrCode = new QRCodeStyling({
        width: 260,
        height: 260,
        type: 'canvas',
        data: value,
        dotsOptions: {
          color: primaryColor,
          type: 'rounded'
        },
        cornersSquareOptions: {
          color: primaryColor,
          type: 'extra-rounded'
        },
        cornersDotOptions: {
          color: primaryColor,
          type: 'dot'
        },
        backgroundOptions: {
          color: backgroundColor
        },
        qrOptions: {
          errorCorrectionLevel: 'M'
        }
      });

      qrCode.append(qrContainer);
      downloadBtn.disabled = false;
    }

    let debounceTimer;
    input.addEventListener('input', (e) => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => {
        createQR(e.target.value);
      }, 250);
    });

    downloadBtn.addEventListener('click', async () => {
      if (!qrCode) return;
      const value = input.value.trim() || 'qrcode';
      const safeName = value
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/^-+|-+$/g, '')
        .substring(0, 40) || 'qrcode';
      qrCode.download({ name: safeName, extension: 'png' });
    });
  </script>
</body>
</html>
